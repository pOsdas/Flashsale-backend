name: Publish Docker images

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: flashsale-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile

          - image: flashsale-go-fetcher
            context: ./go_fetcher
            dockerfile: ./go_fetcher/Dockerfile

          - image: flashsale-ozon-browser-fetcher
            context: ./go_fetcher/internal
            dockerfile: ./go_fetcher/internal/ozon_browser_fetcher/Dockerfile

          - image: flashsale-wb-browser-fetcher
            context: ./go_fetcher/internal
            dockerfile: ./go_fetcher/internal/wb_browser_fetcher/Dockerfile

          - image: flashsale-grafana
            context: ./grafana
            dockerfile: ./grafana/Dockerfile

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/posdas/${{ matrix.image }}:latest
            ghcr.io/posdas/${{ matrix.image }}:${{ github.event.workflow_run.head_sha || github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
