name: CI

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  docker-compose:
    name: Docker Compose validation and image build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare env files and secrets
        run: |
          mkdir -p go_fetcher/secrets

          touch go_fetcher/secrets/wb_cookie.txt
          touch go_fetcher/secrets/ozon_cookie.txt

          cat > backend/.env.docker << 'EOF'
          ENV=dev

          POSTGRES_DB=flashsale
          POSTGRES_USER=user
          POSTGRES_PASSWORD=pwd
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432

          DATABASE_URL=postgresql://user:pwd@postgres:5432/flashsale

          DEBUG=True
          ENABLE_HTTPS_REDIRECT=False
          SECRET_KEY=ci-secret-key
          ALLOWED_HOSTS=["0.0.0.0","127.0.0.1","localhost","backend"]
          ALLOW_DB_CREATE=1
          DJANGO_SETTINGS_MODULE=app_project.settings
          OUTBOX_METRICS_PORT=9100
          LOG_FORMAT=json

          GRAFANA_TELEGRAM_BOT_TOKEN=ci-telegram-bot-token
          GRAFANA_TELEGRAM_CHAT_ID=ci-chat-id

          MONITORING_FETCHER_MODE=http
          GO_FETCHER_BASE_URL=http://go_fetcher:8090
          GO_FETCHER_PARSER_HEALTH_ENDPOINT=/api/v1/parser/health/
          GO_FETCHER_PRODUCT_ENDPOINT=/api/v1/fetch/product/
          GO_FETCHER_API_KEY=test-fetcher-key
          GO_FETCHER_TIMEOUT_SECONDS=20

          NOTIF_TELEGRAM_BOT_TOKEN=ci-telegram-bot-token
          NOTIF_TELEGRAM_BOT_USERNAME=ci_bot
          NOTIF_TELEGRAM_CONNECT_TOKEN_MAX_AGE_SECONDS=900
          NOTIF_TELEGRAM_CONNECT_SIGNING_SALT=flashsale-notif-tg-connect-ci-secret-value
          NOTIF_TELEGRAM_REPLY_RATE_LIMIT_LIMIT=5
          NOTIF_TELEGRAM_REPLY_RATE_LIMIT_WINDOW_SECONDS=60
          NOTIF_TELEGRAM_DROP_PENDING_UPDATES_ON_START=False

          NOTIFICATION_CONSUMER_METRICS_PORT=8011
          NOTIFICATION_RABBITMQ_QUEUE=flashsale.notifications
          NOTIFICATION_RABBITMQ_DLQ=flashsale.notifications.dlq
          NOTIFICATION_RABBITMQ_DLX=flashsale.notifications.dlx
          NOTIFICATION_RABBITMQ_PREFETCH_COUNT=10
          NOTIFICATION_RABBITMQ_ROUTING_KEYS=alert.created

          OUTBOX_DISPATCH_MODE=rabbitmq
          RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
          RABBITMQ_EXCHANGE=flashsale.events

          REDIS_URL=redis://redis:6379/0
          CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
          CELERY_RESULT_BACKEND=redis://redis:6379/1
          EOF

          cat > go_fetcher/.env << 'EOF'
          DJANGO_URL=http://backend:8000

          FETCHER_API_KEY=test-fetcher-key

          WB_REQUEST_DELAY_MS=700
          WB_MAX_RETRIES=3
          WB_RETRY_BASE_DELAY_MS=1000

          OZON_REQUEST_DELAY_MS=700
          OZON_MAX_RETRIES=3
          OZON_RETRY_BASE_DELAY_MS=1000

          OZON_BROWSER_FETCHER_URL=http://ozon_browser_fetcher:8095
          OZON_BROWSER_FETCHER_ENABLED=true
          OZON_BROWSER_FETCHER_TIMEOUT_SECONDS=30
          EOF

      - name: Validate docker compose config
        run: docker compose config

      - name: Build backend image
        run: docker compose build backend

      - name: Build go_fetcher image
        run: docker compose build go_fetcher

      - name: Build ozon_browser_fetcher image
        run: docker compose build ozon_browser_fetcher

      - name: Build grafana image
        run: docker compose build grafana

  go-fetcher:
    name: Go Fetcher checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: go_fetcher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go_fetcher/go.mod
          cache-dependency-path: go_fetcher/go.sum

      - name: Download Go dependencies
        run: go mod download

      - name: Check Go formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run Go tests
        run: go test ./...

  backend:
    name: Backend image build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t flashsale-backend-ci ./backend

      - name: Run Django system check
        run: docker compose run --rm backend python manage.py check
