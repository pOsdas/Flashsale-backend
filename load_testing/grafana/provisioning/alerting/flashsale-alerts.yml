      datasourceUid: Prometheus
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: "max(\n  rabbitmq_detailed_queue_messages_ready{\n    job=\"rabbitmq_detailed\",\n    queue=\"flashsale.notifications.dlq\",\n    vhost=\"/\"\n  }\n) or vector(0)"
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
