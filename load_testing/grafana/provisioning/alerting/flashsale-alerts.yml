    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 1m
    annotations:
      summary: В notification DLQ появились сообщения
      description: В dead-letter queue находятся необработанные notification-сообщения.
    labels:
      severity: critical
      service: rabbitmq
      category: application
    isPaused: false
  - uid: flashsale_rabbitmq_notification_backlog
