      summary: У notification-очереди нет consumer
      description: RabbitMQ сообщает 0 активных consumer для flashsale.notifications, хотя metrics endpoint notification_consumer доступен.
    labels:
      severity: critical
      service: rabbitmq
      category: application
    isPaused: false
