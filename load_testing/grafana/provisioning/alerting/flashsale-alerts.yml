      description: Более 50 сообщений остаются готовыми к обработке в течение 5 минут.
    labels:
      severity: warning
      service: rabbitmq
      category: application
    isPaused: false
  - uid: flashsale_rmq_notif_no_consumer
    title: Notification Queue Has No Consumers
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 300
        to: 0
      model:
        expr: "(\n  max(\n    rabbitmq_detailed_queue_consumers{\n      job=\"rabbitmq_detailed\",\n      queue=\"flashsale.notifications\",\n      vhost=\"/\"\n    }\n  ) == bool 0\n)\n*\n(\n  max(up{job=\"rabbitmq_detailed\"}) == bool 1\n)\n*\n(\n  max(\n    notification_consumer_running{\n      job=\"notification_consumer\"\n    }\n  ) == bool 1\n)"
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
