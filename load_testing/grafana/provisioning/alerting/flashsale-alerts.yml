        to: 0
      model:
        expr: "max(\n  rabbitmq_detailed_queue_messages_ready{\n    job=\"rabbitmq_detailed\",\n    queue=\"flashsale.notifications\",\n    vhost=\"/\"\n  }\n) or vector(0)"
        refId: A
        instant: true
        range: false
    - refId: B
