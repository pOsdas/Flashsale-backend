services:
  postgres:
    image: postgres:17-alpine
    container_name: flashsale_db
    environment:
      POSTGRES_DB: flashsale
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
    volumes:
      - flashsale_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d flashsale"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: flashsale_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://user:pwd@postgres:5432/flashsale?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    container_name: flashsale_redis

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: flashsale_rabbitmq
    ports:
      - "127.0.0.1:15672:15672"
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_management rabbitmq_prometheus &&
             rabbitmq-server"

  redis_exporter:
    image: oliver006/redis_exporter:v1.86.0
    container_name: flashsale_redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  go_fetcher:
    build:
      context: ./go_fetcher
      dockerfile: Dockerfile
    container_name: flashsale_go_fetcher
    env_file:
      - ./go_fetcher/.env
    volumes:
      - ./go_fetcher/secrets:/app/secrets:ro
    command: ["serve"]
    ports:
      - "127.0.0.1:8090:8090"
    depends_on:
      ozon_browser_fetcher:
        condition: service_healthy
    restart: unless-stopped

  ozon_browser_fetcher:
    build:
      context: ./go_fetcher/internal
      dockerfile: ozon_browser_fetcher/Dockerfile
    container_name: flashsale_ozon_browser_fetcher
    environment:
      OZON_COOKIE_PATH: /app/secrets/ozon_cookie.txt
      OZON_BROWSER_HEADLESS: "true"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./go_fetcher/secrets:/app/secrets:ro
    ports:
      - "8095:8095"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/api/v1/health', timeout=5)\"" ]
      interval: 30s
      timeout: 10s
      retries: 3

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_migrate
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "python ensure_db.py"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_backend
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "python manage.py runserver 0.0.0.0:8000"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  outbox_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_outbox_worker
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "python manage.py run_outbox_worker"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  monitoring_scanner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_monitoring_scanner
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "python manage.py run_monitoring_scanner"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      go_fetcher:
        condition: service_started

  notification_consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_notification_consumer
    env_file:
      - ./backend/.env.docker
    command: > 
      sh -c "python manage.py run_notification_consumer"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "127.0.0.1:8011:8011"
    restart: unless-stopped

  telegram_bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_telegram_bot
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "python manage.py run_telegram_onboarding_bot"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.60.3
    container_name: flashsale_cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped

  blackbox_exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    container_name: flashsale_blackbox_exporter
    command:
      - --config.file=/config/blackbox.yml
    volumes:
      - ./blackbox/blackbox.yml:/config/blackbox.yml:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: flashsale_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - flashsale_prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      outbox_worker:
        condition: service_started
      notification_consumer:
        condition: service_started
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: flashsale_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - flashsale_loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: flashsale_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: flashsale_grafana
    env_file:
      - ./backend/.env.docker
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - flashsale_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp -r /etc/grafana/provisioning /tmp/provisioning
        envsubst < /tmp/provisioning/alerting/contact-points.yml.template > /tmp/provisioning/alerting/contact-points.yml
        exec /run.sh --homepath=/usr/share/grafana --config=/etc/grafana/grafana.ini --packaging=docker cfg:default.paths.provisioning=/tmp/provisioning
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

volumes:
  flashsale_postgres_data:
  flashsale_grafana_data:
  flashsale_loki_data:
  flashsale_prometheus_data: