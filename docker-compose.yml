services:
  postgres:
    image: postgres:17-alpine
    container_name: flashsale_db
    environment:
      POSTGRES_DB: flashsale
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
    volumes:
      - flashsale_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d flashsale"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: flashsale_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://user:pwd@postgres:5432/flashsale?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    container_name: flashsale_redis

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: flashsale_rabbitmq
    ports:
      - "127.0.0.1:15672:15672"
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_management rabbitmq_prometheus &&
             rabbitmq-server"

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_migrate
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "python ensure_db.py"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_backend
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "python manage.py runserver 0.0.0.0:8000"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  outbox_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale_outbox_worker
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "python manage.py run_outbox_worker"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: flashsale_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      outbox_worker:
        condition: service_started

  loki:
    image: grafana/loki:3.3.2
    container_name: flashsale_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - flashsale_loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: flashsale_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: flashsale_grafana
    env_file:
      - ./backend/.env.docker
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - flashsale_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp -r /etc/grafana/provisioning /tmp/provisioning
        envsubst < /tmp/provisioning/alerting/contact-points.yml.template > /tmp/provisioning/alerting/contact-points.yml
        exec /run.sh --homepath=/usr/share/grafana --config=/etc/grafana/grafana.ini --packaging=docker cfg:default.paths.provisioning=/tmp/provisioning
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

volumes:
  flashsale_postgres_data:
  flashsale_grafana_data:
  flashsale_loki_data: