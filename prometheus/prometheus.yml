global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "outbox_worker"
    static_configs:
      - targets:
          - "outbox_worker:9100"

  - job_name: "backend"
    metrics_path: /api/v1/prometheus/metrics
    static_configs:
      - targets:
          - "backend:8000"

  - job_name: "postgres"
    static_configs:
      - targets:
          - "postgres_exporter:9187"

  - job_name: "rabbitmq"
    static_configs:
      - targets:
          - "rabbitmq:15692"