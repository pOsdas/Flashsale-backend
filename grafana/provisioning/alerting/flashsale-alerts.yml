apiVersion: 1
groups:
- orgId: 1
  name: Flashsale availability alerts
  folder: Flashsale
  interval: 30s
  rules:
  - uid: flashsale_core_scrape_target_down
    title: Core Prometheus Target Down
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 300
        to: 0
      model:
        expr: |-
          (up{job="prometheus"} == bool 0)
            or absent(up{job="prometheus"})
            or (up{job="backend"} == bool 0)
            or absent(up{job="backend"})
            or (up{job="outbox_worker"} == bool 0)
            or absent(up{job="outbox_worker"})
            or (up{job="monitoring_scanner"} == bool 0)
            or absent(up{job="monitoring_scanner"})
            or (up{job="notification_consumer"} == bool 0)
            or absent(up{job="notification_consumer"})
            or (up{job="telegram_bot"} == bool 0)
            or absent(up{job="telegram_bot"})
            or (up{job="go_fetcher"} == bool 0)
            or absent(up{job="go_fetcher"})
            or (up{job="ozon_browser_fetcher"} == bool 0)
            or absent(up{job="ozon_browser_fetcher"})
            or (up{job="postgres"} == bool 0)
            or absent(up{job="postgres"})
            or (up{job="redis"} == bool 0)
            or absent(up{job="redis"})
            or (up{job="rabbitmq"} == bool 0)
            or absent(up{job="rabbitmq"})
            or (up{job="cadvisor"} == bool 0)
            or absent(up{job="cadvisor"})
            or (up{job="blackbox_exporter"} == bool 0)
            or absent(up{job="blackbox_exporter"})
            or (up{job="loki"} == bool 0)
            or absent(up{job="loki"})
            or (up{job="promtail"} == bool 0)
            or absent(up{job="promtail"})
            or (up{job="grafana"} == bool 0)
            or absent(up{job="grafana"})
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0.5
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 2m
    annotations:
      summary: A required Prometheus scrape target is down
      description: 'Prometheus job {{ $labels.job }} is missing or unavailable. Instance: {{ $labels.instance }}.'
    labels:
      severity: critical
      service: observability
      category: availability
    isPaused: false
  - uid: flashsale_http_probe_failed
    title: HTTP Health Probe Failed
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 300
        to: 0
      model:
        expr: |-
          (probe_success{instance="http://backend:8000/api/v1/prometheus/metrics"} == bool 0)
            or absent(probe_success{instance="http://backend:8000/api/v1/prometheus/metrics"})
            or (probe_success{instance="http://go_fetcher:8090/api/v1/parser/health/"} == bool 0)
            or absent(probe_success{instance="http://go_fetcher:8090/api/v1/parser/health/"})
            or (probe_success{instance="http://ozon_browser_fetcher:8095/api/v1/health"} == bool 0)
            or absent(probe_success{instance="http://ozon_browser_fetcher:8095/api/v1/health"})
            or (probe_success{instance="http://outbox_worker:9100/metrics"} == bool 0)
            or absent(probe_success{instance="http://outbox_worker:9100/metrics"})
            or (probe_success{instance="http://notification_consumer:8011/metrics"} == bool 0)
            or absent(probe_success{instance="http://notification_consumer:8011/metrics"})
            or (probe_success{instance="http://prometheus:9090/-/ready"} == bool 0)
            or absent(probe_success{instance="http://prometheus:9090/-/ready"})
            or (probe_success{instance="http://loki:3100/ready"} == bool 0)
            or absent(probe_success{instance="http://loki:3100/ready"})
            or (probe_success{instance="http://grafana:3000/api/health"} == bool 0)
            or absent(probe_success{instance="http://grafana:3000/api/health"})
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0.5
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 2m
    annotations:
      summary: A required HTTP endpoint is unavailable
      description: Blackbox HTTP probe failed for {{ $labels.instance }}.
    labels:
      severity: critical
      service: blackbox
      category: availability
    isPaused: false
  - uid: flashsale_tcp_probe_failed
    title: TCP Dependency Probe Failed
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 300
        to: 0
      model:
        expr: |-
          (probe_success{instance="postgres:5432"} == bool 0)
            or absent(probe_success{instance="postgres:5432"})
            or (probe_success{instance="redis:6379"} == bool 0)
            or absent(probe_success{instance="redis:6379"})
            or (probe_success{instance="rabbitmq:5672"} == bool 0)
            or absent(probe_success{instance="rabbitmq:5672"})
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0.5
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 2m
    annotations:
      summary: A required TCP dependency is unavailable
      description: Blackbox TCP probe failed for {{ $labels.instance }}.
    labels:
      severity: critical
      service: blackbox
      category: availability
    isPaused: false
- orgId: 1
  name: Flashsale backend and outbox alerts
  folder: Flashsale
  interval: 1m
  rules:
  - uid: flashsale_backend_high_5xx_ratio
    title: Backend High 5xx Ratio
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: |-
          (
            (
              sum(increase(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
              /
              clamp_min(sum(increase(django_http_responses_total_by_status_total[5m])), 1)
            ) > bool 0.05
          )
          *
          (
            sum(increase(django_http_responses_total_by_status_total[5m])) >= bool 20
          )
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0.5
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 5m
    annotations:
      summary: Backend 5xx ratio is above 5%
      description: More than 5% of backend responses are 5xx, with at least 20 requests during the last 5 minutes.
    labels:
      severity: critical
      service: backend
      category: application
    isPaused: false
  - uid: flashsale_backend_high_p95_latency
    title: Backend High P95 Latency
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: |-
          histogram_quantile(
            0.95,
            sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])) by (le)
          ) or vector(0)
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 2
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 5m
    annotations:
      summary: Backend P95 latency is above 2 seconds
      description: The backend P95 request latency remained above 2 seconds for 5 minutes.
    labels:
      severity: warning
      service: backend
      category: application
    isPaused: false
  - uid: flashsale_outbox_failed_events
    title: Failed Outbox Events
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: sum(increase(outbox_events_failed_total[5m])) or vector(0)
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 1m
    annotations:
      summary: New failed outbox events detected
      description: The outbox worker recorded failed processing attempts during the last 5 minutes.
    labels:
      severity: warning
      service: outbox_worker
      category: application
    isPaused: false
  - uid: flashsale_outbox_pending_high
    title: Pending Outbox Events High
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: outbox_pending_events or vector(0)
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 50
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 5m
    annotations:
      summary: Too many pending outbox events
      description: Pending outbox events remained above 50 for 5 minutes.
    labels:
      severity: warning
      service: outbox_worker
      category: application
    isPaused: false
- orgId: 1
  name: Flashsale scanner alerts
  folder: Flashsale
  interval: 1m
  rules:
  - uid: flashsale_scanner_heartbeat_stale
    title: Monitoring Scanner Heartbeat Stale
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 300
        to: 0
      model:
        expr: |-
          (
            time() - monitoring_scanner_last_success_timestamp_seconds
          )
          or
          (
            absent(monitoring_scanner_last_success_timestamp_seconds) * 999999
          )
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 120
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 2m
    annotations:
      summary: Monitoring scanner stopped completing iterations
      description: The last successful scanner iteration is more than 120 seconds old.
    labels:
      severity: critical
      service: monitoring_scanner
      category: application
    isPaused: false
  - uid: flashsale_scanner_overdue_targets
    title: Monitoring Targets Overdue
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: monitoring_scanner_overdue_targets or vector(0)
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 5m
    annotations:
      summary: Monitoring targets are overdue
      description: At least one active target has remained overdue beyond the configured scanner threshold for 5 minutes.
    labels:
      severity: warning
      service: monitoring_scanner
      category: application
    isPaused: false
  - uid: flashsale_scanner_overdue_age_crit
    title: Monitoring Target Severely Overdue
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: monitoring_scanner_oldest_overdue_age_seconds or vector(0)
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 900
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 2m
    annotations:
      summary: A monitoring target is more than 15 minutes overdue
      description: The oldest overdue monitoring target has exceeded 900 seconds.
    labels:
      severity: critical
      service: monitoring_scanner
      category: application
    isPaused: false
  - uid: flashsale_scanner_processing_errors
    title: Monitoring Scanner Processing Errors
    condition: C
    data:
    - refId: A
      datasourceUid: Prometheus
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: sum(increase(monitoring_target_processing_total{result="error"}[10m])) or vector(0)
        refId: A
        instant: true
        range: false
    - refId: B
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: last
        refId: B
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 2
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 1m
    annotations:
      summary: Repeated target processing errors detected
      description: The monitoring scanner produced more than two target processing errors during the last 10 minutes.
    labels:
      severity: warning
      service: monitoring_scanner
      category: application
    isPaused: false
