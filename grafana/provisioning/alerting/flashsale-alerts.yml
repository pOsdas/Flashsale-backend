      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 120
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
          type: query
        refId: C
    noDataState: OK
    execErrState: Error
    for: 5m
    annotations:
      summary: A notification delivery is stuck in pending state
      description: The oldest pending notification delivery has been pending for more than 120 seconds.
    labels:
      severity: warning
      service: notification_consumer
      category: application
